                        <p>A continuación, se presenta el análisis de las agencias informativas, entendidas no como "fuentes" neutrales, sino como expresiones de determinadas fracciones de capital y proyectos políticos en pugna.</p>

                                <tr><td>AP / Reuters</td><td>Global (Centro/Liberal)</td><td>La cobertura se centra en la "desestabilización" y el "caos". La narrativa dominante es la de un mundo que se "fragmenta". La guerra se presenta como un evento meteorológico, despojado de sus determinaciones de clase. El límite de lo decible lo marca el miedo a nombrar al verdadero sujeto: el capital financiero estadounidense que necesita la guerra para sostener la tasa de ganancia y la supremacía del dólar. La noticia de que China "presiona" para que la visita de Trump continúe se enmarca en el cliché de la "rivalidad", sin analizar la co-dependencia estructural que obliga a ambas partes a mantener la farsa del diálogo mientras se aniquilan mutuamente en otros terrenos.</td></tr>

                    contenido: "<p>Detengámonos en esa imagen del barco. No es una postal de la paz. Es la prueba material de que, mientras el fuego consume Oriente Medio, las ruedas del capital global siguen girando. Más aún: el fuego está engrasando esas ruedas para una fracción del capital, mientras las quema para otra. La guerra no es un error, no es una locura. Es la continuación de los negocios por otros medios. El presidente Trump, desde Washington, exige a sus aliados que se unan 'con entusiasmo' a patrullar el Estrecho de Ormuz, y al mismo tiempo sugiere que la visita a Pekín podría depender de que China ayude a abrirlo. La conexión es obscena en su claridad: la sangre que se derrama en Teherán y los dólares que fluyen hacia Shanghái y Washington son la misma sustancia.</p>"

                // --- 5. NUDO DIALÉCTICO ---

                    id: "nudo",

                    titulo: "Coerción y seducción: las dos caras del capital",
                    contenido: "<p>La contradicción central que organiza esta masacre no es entre judaísmo e islam, ni siquiera entre Estados Unidos e Irán. Es la contradicción interimperialista entre dos modelos de acumulación de capital en su fase de crisis terminal.</p><p>Por un lado, tenemos al capital financiero-especulativo encarnado en el complejo militar-industrial de Estados Unidos y su apéndice, el Estado de Israel. Su estrategia es la de la <em>coerción directa</em>. Necesita la guerra para mantener la primacía del dólar petrolero, para justificar un presupuesto de defensa que alimenta a sus corporaciones y para disciplinar a cualquier periferia que ose negociar su autonomía. Pero su discurso, el de la 'defensa de la democracia', se resquebraja. Sus propios aliados europeos se desmarcan. La hegemonía estadounidense, basada en el consentimiento, se ha transformado en pura dominación militar, y la dominación, cuando es el único recurso, es el síntoma inequívoco de la decadencia.</p><p>Por otro lado, tenemos al capitalismo de Estado chino. Su estrategia es la de la <em>seducción estructural</em>. Mientras Estados Unidos quema su poderío en bombas, China acumula poderío en contratos, rutas y reservas de divisas. No necesita invadir Irán; le basta con comprar su petróleo con descuento, ofrecerle una red de seguridad financiera en el BRICS y la OCS, y presentarse como el 'garante de la estabilidad'. Su discurso de paz no es pacifismo; es la forma ideológica que adopta su interés de clase: necesita que el flujo de mercancías no se interrumpa para que su modelo de acumulación, basado en la producción real y la exportación, no colapse.</p><p>Aquí se inserta la guerra como mediación. El conflicto prolongado en Oriente Medio es el crisol donde estas dos lógicas se funden y chocan: <strong>Para Estados Unidos</strong>, la guerra es una trampa. Debe sostenerla para no mostrar debilidad, pero cada misil disparado es un dólar que no se invierte en infraestructura, un aliado que se distancia y una porción mayor del comercio global que busca refugio en el yuan o en el oro. <strong>Para China</strong>, la guerra es una oportunidad histórica. El miedo al fuego empuja al capital europeo y del Golfo a buscar puertos seguros. La necesidad de rutas energéticas alternativas acelera la construcción de los corredores terrestres, materializando la vieja aspiración de esquivar el dominio naval estadounidense. La guerra, así, actúa como un gigantesco acelerador de la historia: fuerza la 'desglobalización' del bloque occidental para forzar la 'reglobalización' en torno al eje asiático.</p><p>La correlación de fuerzas, en este momento, es de un <em>equilibrio inestable que favorece la tendencia china</em>. Estados Unidos está a la ofensiva militar, pero a la defensiva estratégica. Sus golpes son letales, pero no definen el futuro. China está a la defensiva diplomática (evitando la condena directa que rompa sus puentes con Occidente), pero a la ofensiva histórica. Cada día que pasa, la nueva arquitectura financiera y comercial se consolida un poco más en la sombra del conflicto.</p>"

                    meta: "VII. CIERRE DE PRAXIS",
                    titulo: "Ni misil ni contrato",
                    contenido: "<p>Para la clase trabajadora global, para los pueblos de Irán, Líbano, Palestina y de todo el mundo, la dirección estratégica no puede ser elegir entre el misil estadounidense y el contrato de inversión chino. Esa es la falsa elección que la burguesía de ambos bandos nos ofrece. La praxis, aquí, consiste en desgarrar el velo de esa falsa contradicción: no se trata de 'apoyar a China contra el imperialismo yanqui', porque el Estado chino es <em>otra forma</em> de dominación de clase, no su antítesis.</p><p>La tarea es, ante todo, cognitiva: entender que nuestra liberación no vendrá del triunfo de uno de estos gigantes sobre el otro. Vendrá de la capacidad de organizarnos <em>contra</em> ambos, de aprovechar las grietas que esta guerra interimperialista abre para construir poder popular autónomo. La lucha no es por qué polo de la burguesía global dominará el siglo XXI. La lucha es por construir un mundo donde el valor de la vida de un desplazado libanés no sea calculado en la pizarra de un fondo de inversión en Hong Kong o en el presupuesto del Pentágono. El umbral de ruptura histórico no lo marcarán los generales, sino la conciencia de que ni el misil ni el contrato nos representan. Esa conciencia, por ahora, es solo una semilla bajo el fuego. Pero es la única que puede dar un fruto distinto al humo y la ceniza.</p>"
                }
            ]
        }
    ];

    // === LÓGICA DE RENDERIZADO ===
    function cargarArticulo(index) {
        const art = ARTICULOS[index];
        const container = document.getElementById('contenido-principal');
        const menu = document.getElementById('menu-navegacion');
        
        // Actualizar Imagen Hero
        document.getElementById('hero-img').src = art.heroImage;
        
        // Limpiar y Generar Menú
        menu.innerHTML = "";
        art.secciones.forEach(sec => {
            const link = document.createElement('a');
            link.href = `#${sec.id}`;
            // Extraer el número romano (I, II, III, IV, V, VI, VII)
            const romano = sec.meta.split('.')[0];
            link.textContent = romano;
            menu.appendChild(link);
        });

        // Generar Contenido
        let html = `
            <div class="author">Por: ${art.autor} | ${art.fecha}</div>
            <h1>${art.titulo}</h1>
            <p style="font-size: 20px; color: #555; margin-bottom: 40px;">${art.subtitulo}</p>
        `;

        art.secciones.forEach(sec => {
            html += `
                <section id="${sec.id}" class="seccion">
                    <div class="section-meta">${sec.meta}</div>
                    <h2>${sec.titulo}</h2>
                    ${sec.balazo ? `<div class="balazo-ep">${sec.balazo}</div>` : ''}
                    <div class="article-content">${sec.contenido}</div>
                </section>
            `;
        });

        // Añadir caja de comentarios genérica al final
        html += `
            <div class="comentarios">
                <h2>Comentarios</h2>
                <textarea placeholder="Escribe tu opinión..."></textarea><br>
                <button disabled>Publicar (Demo)</button>
            </div>
        `;

        container.innerHTML = html;
    }

    // Iniciar con el primer artículo
    window.onload = () => cargarArticulo(0);
</script>
