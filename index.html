            fecha: "20 de marzo de 2026",
            autor: "Redacción RadioM12e · Dirección: Antonio Sánchez Ballinas",
            heroImage: "https://c.files.bbci.co.uk/481E/production/_100426481_gettyimages-912839046-1.jpg",

                {
                    id: "espectaculo-poder",
                    meta: "1. EL ESPECTÁCULO DEL PODER",
                    titulo: "Un portaaviones en aguas turbulentas",
                    contenido: `<p>La imagen es clásica en su composición: un portaaviones de la clase Gerald R. Ford, rodeado de su grupo de ataque, surca aguas que bien podrían ser del Golfo Pérsico o del Mediterráneo oriental. El Pentágono lo denomina "disuasión". Los medios globales, desde Associated Press hasta Reuters, lo presentan como parte del despliegue rutinario para hacer frente a la "amenaza iraní". La fotografía se reproduce en cadenas internacionales, en portales de noticias, en redes sociales. Es la apariencia inmediata del poder estadounidense: una flota que vale decenas de miles de millones de dólares, tripulada por miles de marinos, armada hasta los dientes con misiles Tomahawk y aviones de quinta generación.</p>
                    <p>Lo que no se ve en la imagen es el costo. No el costo en dólares del combustible que queman los reactores nucleares del portaaviones, sino el costo social que implica mantener esa máquina de guerra en estado de alerta permanente. Las agencias de noticias occidentales reportan el despliegue como un hecho geopolítico más, una pieza en el tablero del Gran Juego entre Washington y Teherán. Pero detrás de ese despliegue hay una contabilidad que la burguesía prefiere mantener en las sombras: la contabilidad de lo que se sacrifica en el interior del imperio para sostener su proyección externa.</p>
                    <p>La pregunta que surge en la superficie es técnica, casi ingenieril: ¿cuánto cuesta, por día, mantener esta maquinaria? La respuesta que circula en los círculos de analistas militares ronda los 30 millones de dólares diarios para un grupo de ataque de portaaviones en misión de alta disponibilidad. Una cifra que, para el ciudadano común, resulta tan abstracta como los millones de kilómetros cuadrados de océano que la flota patrulla. Pero esa cifra no es abstracta. Es trabajo social no realizado en vivienda. Es salario no pagado en educación. Es vida que se convierte en acero naval.</p>`,
                    balazo: "Cada dólar destinado a la guerra es un dólar sustraído de la posibilidad de una existencia digna para las mayorías."
                },
                {
                    id: "contabilidad-muerte",
                    meta: "2. LA CONTABILIDAD DE LA MUERTE",
                    titulo: "Lo que esconde el presupuesto del Pentágono",
                    contenido: `<p>Para el año fiscal 2024, el Congreso estadounidense aprobó un presupuesto base para el Pentágono de 886.000 millones de dólares. Esta cifra, de por sí colosal, no incluye los gastos del Departamento de Energía en armamento nuclear ni los fondos extrapresupuestarios para guerras no declaradas. Si se suman todos los rubros de "seguridad nacional", la cifra supera holgadamente el billón de dólares anuales. Es el presupuesto militar más alto del planeta, superior al de los siguientes diez países combinados.</p>
                    <p>Cada misil Tomahawk que el portaaviones puede lanzar cuesta 1.4 millones de dólares. Cada hora de vuelo de un caza F-35 cuesta 38.000 dólares. Cada día que el grupo de ataque permanece en estación, consumiendo combustible, mantenimiento, salarios y munición simulada, se llevan 30 millones de dólares. Si el despliegue se convierte en guerra abierta, los costos se disparan. Durante la guerra de Irak, el costo operativo alcanzó los 300 millones de dólares diarios en los momentos de mayor intensidad.</p>
                    <p>La prensa liberal, cuando aborda el tema, lo hace desde la perspectiva de la "eficiencia del gasto" o del "peso sobre el contribuyente". Pero el contribuyente no es un ente abstracto. Es un trabajador que ve cómo sus impuestos financian destructores mientras su escuela pública cierra, mientras el puente de su ciudad se cae, mientras su seguro médico no cubre el tratamiento que necesita. La ideología dominante presenta el presupuesto militar como un gasto necesario para la "seguridad nacional". Lo que oculta es que ese presupuesto es el mecanismo mediante el cual las grandes corporaciones del complejo militar-industrial —Lockheed Martin, Raytheon, General Dynamics, Northrop Grumman— realizan su acumulación de capital, mientras el Estado socializa las pérdidas y las consecuencias.</p>`,
                    balazo: "886.000 millones de dólares anuales: más que los siguientes diez países militares combinados. Eso es guerra, no defensa."
                },
                {
                    id: "pobreza-imperio",
                    meta: "3. LA CARA INTERNA DEL IMPERIO",
                    titulo: "Pobreza en la tierra de la opulencia",
                    contenido: `<p>Mientras el portaaviones navega, en Estados Unidos hay 38 millones de personas viviendo en la pobreza oficial. La Oficina del Censo, con sus metodologías diseñadas para minimizar el problema, reporta una tasa del 11.5% para 2023. Pero esta cifra es una abstracción ideológica. Si se aplica el Índice de Pobreza Suplementario, que considera los costos reales de vida, los gastos médicos y el impacto de los recortes a los programas sociales tras la pandemia, la tasa asciende al 12.4%.</p>
                    <p>La pobreza no es un fenómeno natural ni accidental. Es una relación social producida y reproducida por el modo de acumulación. El 19% de los niños estadounidenses vive en pobreza. En un país que se presenta como el líder del mundo libre, uno de cada cinco niños no tiene garantizado lo básico. El 21% de la población afroamericana vive en pobreza. El 17% de la población latina. La marginación social tiene rostro racial porque el capitalismo estadounidense fue construido sobre la esclavitud y la segregación, y continúa reproduciendo esas divisiones como mecanismo de dominación.</p>
                    <p>Más de 650.000 personas viven sin hogar en Estados Unidos, según datos del Departamento de Vivienda. Ciudades como Los Ángeles, Nueva York y San Francisco tienen verdaderos campamentos de personas durmiendo en las calles, mientras los alquileres se disparan y los salarios reales se estancan. La deuda de los hogares alcanzó los 17.8 billones de dólares en 2024. Deuda médica, deuda estudiantil, deuda de tarjetas de crédito. La clase trabajadora estadounidense, una de las más productivas del planeta, ve cómo el fruto de su trabajo se convierte en ganancias para unos pocos mientras ella misma se hunde en la precariedad.</p>`,
                    balazo: "650.000 personas sin hogar, 38 millones en pobreza: el costo interno de sostener un imperio."
                },
                {
                    id: "calculo-ideologia",
                    meta: "4. EL CÁLCULO QUE LA IDEOLOGÍA PROHÍBE",
                    titulo: "Guerra o vida",
                    contenido: `<p>Ahora realicemos el ejercicio que la prensa corporativa jamás hace. Tomemos los 300 millones de dólares diarios que costaría una guerra a gran escala contra Irán, según los parámetros de conflictos anteriores. Preguntémonos qué significa esa cifra en términos de reproducción social.</p>
                    <p>Con 300 millones de dólares, en un solo día se podrían proporcionar vales de alimentación suplementaria a más de 1.2 millones de personas durante un mes entero. El programa SNAP, que ayuda a familias de bajos ingresos a comprar alimentos, tiene un costo mensual por beneficiario de aproximadamente 250 dólares. En un día de guerra, se podría alimentar durante un mes a una población equivalente a la de la ciudad de San Diego.</p>
                    <p>Con el costo de un mes de guerra a gran escala —unos 9.000 millones de dólares— se podría eliminar la falta de vivienda crónica en todo Estados Unidos. Los presupuestos municipales y estatales llevan décadas luchando con presupuestos de cientos de millones para abordar una crisis que requiere inversiones en escala federal. Un mes de guerra equivale a resolver de un plumazo lo que la burocracia y la mezquindad fiscal mantienen como llaga abierta.</p>
                    <p>Con el costo anual del Pentágono, se podría implementar un sistema de salud universal que cubriera a todos los estadounidenses, eliminando la deuda médica que arruina a millones de familias cada año. Se podría duplicar el presupuesto federal para educación pública, garantizando salarios dignos para los maestros, infraestructura escolar adecuada y becas para que cualquier joven pueda acceder a la universidad sin condenarse a una deuda perpetua.</p>
                    <p>Este no es un ejercicio contable moralista. Es la demostración de la ley del valor llevada a su extremo más bárbaro. El capital fijo —la maquinaria de guerra, los portaaviones, los misiles— se valoriza a sí mismo mediante la destrucción de las condiciones de vida de la fuerza de trabajo. Cada dólar destinado a la guerra es un dólar sustraído de la posibilidad de una existencia digna para las mayorías. La acumulación de capital en el sector militar exige la desacumulación de las condiciones de reproducción de la clase trabajadora.</p>`,
                    balazo: "Un mes de guerra (9.000 millones de dólares) = erradicar el sinhogarismo crónico en EE.UU. La ecuación es brutal."
                },
                {
                    id: "mediaciones-consenso",
                    meta: "5. MEDIACIONES DEL CONSENSO",
                    titulo: "Estado, medios y fracciones de clase",
                    contenido: `<p>La apariencia ideológica que separa el presupuesto militar de la pobreza interna no se sostiene por sí sola. Requiere todo un complejo de mediaciones institucionales y discursivas que operan las 24 horas del día. Los medios de comunicación son la primera línea de este dispositivo.</p>
                    <p>Associated Press y Reuters, los grandes cables globales, funcionan como sensores del capital. Establecen los límites de lo decible, los términos del debate aceptable. Cuando informan sobre el despliegue militar contra Irán, lo hacen desde el supuesto no cuestionado de que Estados Unidos tiene derecho a proyectar poder militar en todo el planeta. La "amenaza" iraní se da por supuesta. La legitimidad de la disuasión, también. El debate queda circunscrito a si el gobierno demócrata es "suficientemente duro" o si debería buscar más aliados. La pregunta por el costo interno no aparece.</p>
                    <p>EFE y AFP, las agencias europeas, aportan el barniz socialdemócrata. Sus titulares insisten en la "preocupación" de la comunidad internacional, en la "necesidad" de una solución diplomática. Pero nunca cuestionan el hecho de que un país gaste un billón de dólares al año en matar mientras millones de sus ciudadanos pasan hambre. La socialdemocracia europea, en crisis terminal, ha internalizado la separación entre lo económico y lo político: la guerra es cosa de "realpolitik", la pobreza es un "problema social" que se atiende con caridad, no con redistribución.</p>
                    <p>El Estado estadounidense, en su doble carácter de condensación de la correlación de fuerzas, muestra sus fracturas pero también su unidad esencial. El Departamento de Estado, la Casa Blanca, el Pentágono, la Reserva Federal y el Congreso —con sus fracciones que van desde la socialdemocracia funcional hasta el trumpismo más reaccionario— coinciden en lo fundamental: el presupuesto militar es sagrado. Los debates sobre el techo de deuda, los cierres patronales del gobierno, las peleas por los recortes fiscales, todo ocurre en los márgenes. El núcleo duro del gasto militar nunca se discute.</p>`,
                    balazo: "El presupuesto militar es sagrado: ese es el consenso de clase que atraviesa demócratas y republicanos."
                },
                {
                    id: "fragmentacion-trabajadora",
                    meta: "6. FRAGMENTACIÓN DE LA CLASE TRABAJADORA",
                    titulo: "Analfabetismo, aislamiento y resignación",
                    contenido: `<p>El índice de marginación en Estados Unidos no es solo económico. Es cultural y político. Según el Centro Nacional de Estadísticas Educativas, el 54% de los adultos estadounidenses lee por debajo del nivel de sexto grado. El 21% es funcionalmente analfabeto. Esto significa que más de 50 millones de adultos tienen dificultades para leer un periódico, entender un contrato de trabajo o seguir un debate político complejo.</p>
                    <p>Este no es un accidente. Es el producto de un sistema escolar segregado racial y económicamente, desfinanciado sistemáticamente por décadas, que prepara contingentes de mano de obra disciplinada para los ejércitos de reserva o para los ejércitos de invasión. La industria cultural —televisión basura, redes sociales diseñadas para la adicción, música que promueve el consumo acrítico— completa el trabajo de despolitización.</p>
                    <p>La fragmentación geográfica refuerza el aislamiento. El cierre de fábricas en el Cinturón del Óxido dejó ciudades enteras sin base económica, con poblaciones empobrecidas, adictas a opioides y políticamente volatilizadas. El Sur, con su tradición de lucha obrera negra, ha sido sometido a décadas de leyes anti-sindicales y represión. El Oeste, con sus economías tecnológicas, ha creado enclaves de alta productividad rodeados de ejércitos de precarios que viven en sus autos.</p>
                    <p>La correlación de fuerzas muestra una clase trabajadora fragmentada, racializada, geográficamente aislada y culturalmente despolitizada. Pero también muestra brotes de recomposición. Las huelgas de autotrabajadores de 2023, las enfermeras que paralizaron hospitales en Nueva York y California, los trabajadores de puertos que cerraron la costa Oeste, los sindicatos de escritores y actores que desafiaron a los estudios de Hollywood: todos ellos son indicios de una combatividad que rompe la apariencia de resignación.</p>`,
                    balazo: "El analfabetismo funcional del 21% no es casualidad: es parte del dispositivo de dominación."
                },
                {
                    id: "umbral-ruptura",
                    meta: "7. EL UMBRAL DE RUPTURA",
                    titulo: "Crisis económica, crisis política, crisis de hegemonía",
                    contenido: `<p>La contradicción entre el costo de la reproducción imperial y el costo de la reproducción de la fuerza de trabajo no puede mantenerse indefinidamente. La acumulación de contradicciones prepara el salto cualitativo. Los indicadores de crisis se multiplican.</p>
                    <p>La deuda pública estadounidense supera los 34 billones de dólares. El servicio de esa deuda consume cada vez más recursos que podrían destinarse a infraestructura social. La Reserva Federal mantiene tasas de interés altas para enfriar la economía, pero esa política encarece el crédito para las familias y pequeñas empresas mientras no afecta la capacidad de financiamiento de las grandes corporaciones. La inflación golpea con más fuerza a los que menos tienen. El mercado inmobiliario se ha convertido en una máquina de extracción de renta gestionada por fondos de inversión que compran casas para alquilarlas a precios imposibles.</p>
                    <p>En el plano político, la crisis de hegemonía es evidente. Los dos partidos mayoritarios representan facciones de la misma clase, pero ninguna de ellas logra construir una dirección intelectual y moral que cohesione a la sociedad. El trumpismo emergió como la expresión reaccionaria de un malestar real: el abandono de las clases populares por parte de una élite demócrata que solo se moviliza por las guerras en el extranjero y las causas identitarias en el país. La respuesta liberal al trumpismo ha sido el militarismo y el anticomunismo rampante, profundizando el cierre del horizonte político.</p>
                    <p>Pero el peligro no es solo la guerra contra Irán, cuyas consecuencias serían una conflagración regional que elevaría el precio del petróleo, desataría una crisis inflacionaria global y arrastraría a millones de personas a la muerte y el desplazamiento. El peligro es que la clase trabajadora estadounidense continúe sin percibir que su miseria cotidiana es el costo de operación de un imperio. Que siga votando por los demócratas que le prometen alivio mientras financian la guerra. Que siga creyendo que el enemigo está en Teherán o Pekín, no en Wall Street y el Pentágono.</p>`,
                    balazo: "34 billones de dólares de deuda pública mientras el Pentágono no conoce recortes: el Estado al servicio de la muerte."
                },
                {
                    id: "direccionalidad",
                    meta: "8. DIRECCIONALIDAD HISTÓRICA",
                    titulo: "Entre la barbarie y la recomposición",
                    contenido: `<p>La dirección objetiva de la coyuntura, si se la observa desde la superficie, apunta a una profundización del dominio del capital a través de la guerra y la austeridad. El imperialismo estadounidense, en su fase de declive relativo frente a China y en medio de la confrontación con Rusia, tiende a endurecer su política exterior y a aumentar la represión interna. Las capas medias se empobrecen. Los trabajadores se precarizan. Los migrantes son utilizados como chivos expiatorios. La democracia formal se vacía de contenido.</p>
                    <p>Pero la dialéctica enseña que la acumulación de contradicciones no solo profundiza la crisis del sistema, sino que crea las condiciones subjetivas para su superación. Las huelgas de los últimos años muestran una recomposición de la combatividad obrera que había estado dormida durante décadas. La solidaridad con Palestina que ha brotado en las universidades y las calles muestra que la conciencia antiimperialista no ha muerto. La discusión sobre el costo de la guerra, cuando se la arranca del ámbito técnico y se la sitúa en el ámbito de la lucha de clases, puede convertirse en un arma de masas.</p>
                    <p>El criterio ético-normativo que guía esta reflexión no es abstracto. Se trata de los intereses históricos del proletariado y de las naciones oprimidas, tanto en el interior del imperio como en su periferia. Desde esa perspectiva, la guerra contra Irán no es un conflicto entre estados, sino un ataque del capital internacional contra las posibilidades de autodeterminación de los pueblos de la región, y simultáneamente un ataque contra las condiciones de vida de los trabajadores estadounidenses.</p>
                    <p>La orientación para la acción, entonces, es la necesidad de construir la mediación consciente que conecte el portaaviones en el Golfo con la escuela sin calefacción en Chicago. Significa demostrar materialmente, con cifras, con ejemplos, con organización, que cada dólar destinado a la guerra es un dólar robado a la vida. Significa construir la solidaridad concreta con el pueblo iraní, asfixiado por sanciones que son la otra cara de la guerra, y también con los soldados estadounidenses enviados a matar y morir por intereses que no son los suyos.</p>
                    <p>No hay neutralidad posible en este terreno. El costo de la guerra es el precio de la barbarie. Su rechazo organizado, consciente, militante, es la base para una nueva civilización. El portaaviones seguirá surcando los mares mientras la clase trabajadora no le arranque al Estado los recursos que hoy se destinan a la destrucción. Pero la historia no está escrita. La correlación de fuerzas puede cambiar. Y cambiará, cuando aquellos que producen la riqueza del país comprendan que tienen el poder de decidir cómo se distribuye.</p>`,
                    balazo: "No hay neutralidad: o se financia la guerra o se financia la vida. La clase trabajadora tiene el poder de decidir."
                }
            ]
        }
    ];

    function cargarArticulo(index) {
        const art = ARTICULOS[index];
        const container = document.getElementById('contenido-principal');
        const menu = document.getElementById('menu-navegacion');
        const heroImg = document.getElementById('hero-img');
        if (heroImg) heroImg.src = art.heroImage;
        
        menu.innerHTML = "";
        art.secciones.forEach(sec => {
            const link = document.createElement('a');
            link.href = `#${sec.id}`;
            link.textContent = sec.meta.split(':')[0] + " · " + sec.id.replace(/-/g,' ').toUpperCase();
            menu.appendChild(link);
        });

        let html = `
            <div class="autor-destacado">
                ✍️ ${art.autor} | ${art.fecha}
            </div>
            <h1>${art.titulo}</h1>
            <p style="font-size: 20px; color: #555; margin-bottom: 30px; border-left: 2px solid #c00; padding-left: 18px;">${art.subtitulo}</p>
        `;

        art.secciones.forEach(sec => {
            html += `
                <section id="${sec.id}" class="seccion">
                    <div class="section-meta">${sec.meta}</div>
                    <h2>${sec.titulo}</h2>
                    ${sec.balazo ? `<div class="balazo-ep">⚡ ${sec.balazo}</div>` : ''}
                    <div class="article-content">${sec.contenido}</div>
                </section>
            `;
        });

        html += `
            <div class="comentarios">
                <h2>Comentarios y debate</h2>
                <textarea rows="4" placeholder="Escribe tu opinión o reflexión..."></textarea><br>
                <button disabled style="padding:10px 20px; background:#111; color:white; opacity:0.6; border:none;">Publicar (versión de análisis)</button>
                <p style="font-size:12px; margin-top:10px;">Foro de discusión crítica — la palabra es herramienta de transformación.</p>
            </div>
        `;

        container.innerHTML = html;
    }

    window.onload = () => {
        cargarArticulo(0);
        const bannerLink = document.getElementById('banner-link');
        if(bannerLink) bannerLink.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('espectaculo-poder')?.scrollIntoView({ behavior: 'smooth' });
        });
    };
</script>
</body>
</html>
